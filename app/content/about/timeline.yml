    note: Built engineering org of 280+ leaders including 42 in AI / NextGen. End-to-end ownership of a global software platform.

  - year: 2024
    role: AI Architect (multiple shipped products)
    company: Brane Enterprises
    note: Real-time AI Interviewer (Pipecat + Daily.co). DigiHire.ai recruitment platform. No-code AI platform. Enterprise Digital Twin. Custom LLM fine-tuning with RAG.

  - year: 2026
    role: AI Builder · Architect · Advisor
    company: Independent + Brane
    note: Public flip toward AI building, advisory, and founder mentorship.
